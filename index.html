// =====================================================================
//  ASSET KATMANI — sonradan PNG giydirmek için soyutlama
//  (şu an hiçbir dosya yüklenmiyor; images boş => her zaman fallback çizilir)
// =====================================================================
const Assets = {
  images: {},   // key -> yüklenmiş Image
  loaded: 0,
  total: 0,
  // Image objesi oluşturur, onload'da images[key] doldurur. Şimdilik çağrılmıyor.
  load(key, src) {
    this.total++;
    const img = new Image();
    img.onload = () => { this.images[key] = img; this.loaded++; };
    img.onerror = () => { this.loaded++; };
    img.src = src;
    return img;
  }
};

const Sprite = {
  // Asset yüklüyse onu çizer; değilse fallback(ctx,x,y,w,h) ile mevcut çizimi yapar.
  // fit: "stretch" (varsayılan), "contain" (kutuya sığdır, kırpma yok),
  //      "cover" (kutuyu doldur, taşan kenarlar kırpılır). Oran korunur.
  draw(ctx, key, x, y, w, h, fallback, fit) {
    const img = Assets.images[key];
    if (img && img.complete && img.naturalWidth > 0) {
      if (!fit || fit === "stretch") {
        ctx.drawImage(img, x, y, w, h);
        return;
      }
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const scale = fit === "cover"
        ? Math.max(w / iw, h / ih)
        : Math.min(w / iw, h / ih);
      const dw = iw * scale, dh = ih * scale;
      const dx = x + (w - dw) / 2, dy = y + (h - dh) / 2;
      if (fit === "cover") {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, w, h);
        ctx.clip();
        ctx.drawImage(img, dx, dy, dw, dh);
        ctx.restore();
      } else {
        ctx.drawImage(img, dx, dy, dw, dh);
      }
    } else if (fallback) {
      fallback(ctx, x, y, w, h);
    }
  }
};

// =====================================================================

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let DPR = 1;

function resize() {
  DPR = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  canvas.width = Math.round(w * DPR);
  canvas.height = Math.round(h * DPR);
  layout.w = w;
  layout.h = h;
  computeLayout();
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);

// =====================================================================
//  LAYOUT HESABI
// =====================================================================
function computeLayout() {
  const W = layout.w, H = layout.h;

  // --- Merkezî 9:16 oyun kolonu (stage). Geniş ekranda ortada dikey kolon,
  //     kenarlar arka plan PNG'si ile dolar. Tüm UI bu kolona göre konumlanır. ---
  const aspect = 9 / 16;
  let sw, sh;
  if (W / H > aspect) { sh = H; sw = H * aspect; }
  else { sw = W; sh = W / aspect; }
  const sx = (W - sw) / 2;
  const sy = (H - sh) / 2;
  layout.stage = { x: sx, y: sy, w: sw, h: sh };

  // yatay iç boşluk (stage genişliğine göre)
  const padX = sw * 0.05;
  const left = sx + padX;
  const colW = sw - padX * 2;

  // --- Dikey düzen (Büfeci mantığı) ---
  //   üst (ince)           : HUD
  //   üst-orta (büyük)     : konuşma balonu + DEV müşteri
  //   tezgah çizgisi       : ahşap bant (müşteriyi göğüsten keser, üstüne seçilen ilaçlar dizilir)
  //   alt                  : ilaç seçim grid'i (2x3) + SERVİS ET (en altta)
  const hudY = sy + (window.__safeTop || 0) + sh * 0.018;
  const hudH = sh * 0.082;

  // tezgah (ahşap bant) — müşterinin kesildiği çizgi
  const counterLine = sy + sh * 0.555;
  const bandH = sh * 0.12;
  layout._counterLine = counterLine;
  layout._band = { x: sx, y: counterLine, w: sw, h: bandH };

  // seçilen ilaçların dizildiği tezgah alanı (ahşap bandın üstünde, müşterinin önünde)
  layout._counterArea = {
    x: left,
    y: counterLine + sh * 0.024,
    w: colW,
    h: bandH - sh * 0.042
  };

  // --- Servis butonu (en alt) ---
  const btnH = sh * 0.082;
  const btnY = sy + sh - btnH - sh * 0.02 - (window.__safeBottom || 0);
  layout.serveBtn = { x: left, y: btnY, w: colW, h: btnH };

  // --- Kategori sekmeleri + ilaç seçim grid'i (bandın ALTINDA) ---
  const zoneTop = counterLine + bandH + sh * 0.012;
  const tabH = sh * 0.056;
  layout.tabsArea = { x: left, y: zoneTop, w: colW, h: tabH };
  const gridTop = zoneTop + tabH + sh * 0.012;
  const gridBottom = btnY - sh * 0.016;
  layout.gridArea = { x: left, y: gridTop, w: colW, h: gridBottom - gridTop };

  if (!game.activeGroup) {
    const first = groupsWithMeds()[0];
    game.activeGroup = first ? first.id : null;
  }
  buildTabs();
  buildShelf();

  layout._hud = { x: left, y: hudY, w: colW, h: hudH };

  // hasta alanı: HUD altı .. tezgah çizgisi (DEV müşteri burada, alttan banda gömülür)
  const patientTop = hudY + hudH + sh * 0.004;
  layout._patientArea = {
    x: sx,
    y: patientTop,
    w: sw,
    h: counterLine - patientTop
  };

  rebuildCounterSlots();
}

function rebuildCounterSlots() {
  const b = layout._band;
  if (!b) return;
  layout.counterSlots = [];
  const n = game.counter.length;
  if (n === 0) return;
  const sw = layout.stage.w;
  // tezgah bandının ~%78'i kadar büyük tile'lar
  let slot = Math.min(b.h * 0.78, sw * 0.17);
  let gap = sw * 0.025;
  // çok ilaç varsa sığacak şekilde küçült
  const maxW = b.w * 0.92;
  let totalW = n * slot + (n - 1) * gap;
  if (totalW > maxW) { const k = maxW / totalW; slot *= k; gap *= k; totalW = maxW; }
  // alt kenar tezgah yüzeyine otursun (yüzey ~bandın üst %58'i)
  const baseline = b.y + b.h * 0.60;
  const sy = baseline - slot;
  let sx = b.x + (b.w - totalW) / 2;
  for (let i = 0; i < n; i++) {
    layout.counterSlots.push({ id: game.counter[i], idx: i, x: sx, y: sy, w: slot, h: slot });
    sx += slot + gap;
  }
}

// kategori sekmelerinin yatay yerleşimi (içerik koordinatında x; tabScroll ile kaydırılır)
function buildTabs() {
  const ta = layout.tabsArea;
  layout.tabs = [];
  if (!ta) return;
  const groups = groupsWithMeds();
  const fs = ta.h * 0.36;
  ctx.font = "800 " + fs + "px " + RX_FONT;   // çizimdeki en geniş ağırlıkla ölç
  const gap = ta.h * 0.22;                      // sekmeler arası net boşluk
  const padInner = ta.h * 0.42;                 // metin etrafı iç boşluk
  const emojiPad = ta.h * 0.55;                 // emoji'ler ölçümden geniş render olur, pay bırak
  const minW = ta.h * 2.0;                      // dokunma için makul alt sınır
  let x = 0;
  for (const g of groups) {
    const label = g.emoji + " " + g.label;
    const btnW = Math.max(minW, ctx.measureText(label).width + padInner * 2 + emojiPad);
    layout.tabs.push({ group: g, x, w: btnW + gap });  // w = buton + arkasındaki boşluk
    x += btnW + gap;
  }
  const total = x - gap;                 // son boşluğu sayma
  layout.tabsTotal = total;
  if (total <= ta.w) {
    // sığıyorsa şeridi ortala, kaydırma yok
    layout.tabsOffset = (ta.w - total) / 2;
    layout.tabScroll = 0;
  } else {
    // sığmıyorsa soldan başla, sağa kaydırılabilir
    layout.tabsOffset = 0;
    layout.tabScroll = clamp(layout.tabScroll || 0, 0, total - ta.w);
  }
  ensureActiveTabVisible();
}

// aktif sekmeyi görünür alana kaydır (gerekiyorsa)
function ensureActiveTabVisible() {
  const ta = layout.tabsArea;
  if (!ta || !layout.tabs || (layout.tabsTotal || 0) <= ta.w) return;
  const t = layout.tabs.find(t => t.group.id === game.activeGroup);
  if (!t) return;
  const left = t.x, right = t.x + t.w;
  if (left < layout.tabScroll) layout.tabScroll = left;
  else if (right > layout.tabScroll + ta.w) layout.tabScroll = right - ta.w;
  layout.tabScroll = clamp(layout.tabScroll, 0, layout.tabsTotal - ta.w);
}

// seçili gruptaki ilaçları grid'e yerleştir (otomatik satır/sütun, ortalı)
function buildShelf() {
  const area = layout.gridArea;
  layout.shelfButtons = [];
  if (!area) return;
  const meds = medsInGroup(game.activeGroup);
  const n = meds.length;
  if (n === 0) return;

  const maxCols = 5;
  const cols = Math.min(maxCols, n);
  const rows = Math.ceil(n / cols);
  const gap = layout.stage.w * 0.022;
  let cell = Math.min(
    (area.w - gap * (cols - 1)) / cols,
    (area.h - gap * (rows - 1)) / rows,
    layout.stage.w * 0.20            // tek ilaçta dev olmasın
  );
  const blockH = rows * cell + gap * (rows - 1);
  const startY = area.y + (area.h - blockH) / 2;
  for (let i = 0; i < n; i++) {
    const r = Math.floor(i / cols);
    const c = i % cols;
    const rowCount = Math.min(cols, n - r * cols);          // son satır eksikse o satırı ortala
    const rowW = rowCount * cell + gap * (rowCount - 1);
    const startX = area.x + (area.w - rowW) / 2;
    layout.shelfButtons.push({
      id: meds[i].id,
      x: startX + c * (cell + gap),
      y: startY + r * (cell + gap),
      w: cell,
      h: cell
    });
  }
}

function getMedicine(id) { return MEDICINES.find(m => m.id === id); }
function rand(n) { return Math.floor(Math.random() * n); }
function pick(arr) { return arr[rand(arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function activePatient() { return game.queue.length ? game.queue[0] : null; }

function goalForDay() { return CONFIG.dailyGoal * game.dayNumber; }

// yeni hasta üret ve kuyruğa ekle
function spawnPatient() {
  if (game.queue.length >= CONFIG.maxQueue) return;

  const avatarDef = pick(PATIENT_AVATARS);
  const isPrescription = Math.random() < CONFIG.prescriptionChance;

  let request;
  if (isPrescription) {
    const count = CONFIG.minPrescriptionItems +
      rand(CONFIG.maxPrescriptionItems - CONFIG.minPrescriptionItems + 1);
    const pool = MEDICINES.slice();
    const items = [];
    for (let i = 0; i < count && pool.length; i++) {
      const m = pool.splice(rand(pool.length), 1)[0];
      const roll = Math.random();             // adet: çoğu ×1, bazıları ×2/×3
      const qty = roll < 0.70 ? 1 : roll < 0.92 ? 2 : 3;
      items.push({ id: m.id, qty });
    }
    // reçete üst bilgisi (bir kez atanır, sabit kalır)
    const doc = pick(DOCTORS);
    const dd = String(((game.dayNumber * 3 + 11) % 28) + 1).padStart(2, "0");
    request = {
      type: "prescription",
      items,
      doctor: doc.name,
      sig: doc.sig,
      date: dd + ".06"
    };
  } else {
    const symptom = pick(SYMPTOMS);
    request = { type: "symptom", symptom };
  }

  const patient = {
    avatar: avatarDef.emoji,
    avatarKey: avatarDef.assetKey,
    request,
    maxPatience: CONFIG.basePatience,
    patience: CONFIG.basePatience,
    enterT: 0,
    posCurrent: game.queue.length + 0.85  // sağdan kayarak girsin
  };
  game.queue.push(patient);
}

// aktif hastanın beklediği ilaç çoklu-kümesi (adetli => id tekrarlı liste)
function expectedMedicineIds() {
  const p = activePatient();
  if (!p) return [];
  if (p.request.type === "prescription") {
    const out = [];
    for (const it of p.request.items) for (let i = 0; i < it.qty; i++) out.push(it.id);
    return out;
  } else {
    return MEDICINES.filter(m => m.category === p.request.symptom.category).map(m => m.id);
  }
}

// iki listeyi çoklu-küme olarak karşılaştır (sıra önemsiz, adet önemli)
function sameMultiset(a, b) {
  if (a.length !== b.length) return false;
  const m = {};
  for (const x of a) m[x] = (m[x] || 0) + 1;
  for (const x of b) { if (!m[x]) return false; m[x]--; }
  return true;
}

function tapMedicine(id) {
  if (game.feedback || !activePatient()) return;
  game.counter.push(id);
  rebuildCounterSlots();
}

function removeFromCounter(idx) {
  if (game.feedback) return;
  game.counter.splice(idx, 1);
  rebuildCounterSlots();
}

function checkOrder() {
  const p = activePatient();
  if (game.feedback || !p) return;
  if (game.counter.length === 0) return;

  const expected = expectedMedicineIds();
  const given = game.counter.slice();

  let correct = false;
  if (p.request.type === "prescription") {
    correct = sameMultiset(expected, given);   // doğru ilaçlar + doğru adet
  } else {
    correct = given.length === 1 && expected.includes(given[0]);
  }

  game.dayStats.served++;
  if (correct) {
    const earn = given.length * CONFIG.pricePerMedicine;
    game.money += earn;
    game.dayStats.money += earn;
    game.dayStats.correct++;
    game.reputation = clamp(game.reputation + CONFIG.repGainCorrect, CONFIG.minReputation, CONFIG.maxReputation);
    game.feedback = { ok: true, angry: false, text: "✓ Teşekkürler!  +" + earn + "₺", t: 0 };
  } else {
    game.dayStats.wrong++;
    game.reputation = clamp(game.reputation - CONFIG.repLossWrong, CONFIG.minReputation, CONFIG.maxReputation);
    game.feedback = { ok: false, angry: false, text: "✗ Yanlış ilaç!", t: 0 };
  }
}

// feedback bitince aktif hasta çıkar, sıra kayar
function onFeedbackEnd() {
  game.queue.shift();
  game.counter = [];
  game.feedback = null;
  rebuildCounterSlots();
}

function endDay() {
  game.state = STATE.DAYEND;
  game.feedback = null;
  game.dayResult = {
    goal: goalForDay(),
    met: game.dayStats.money >= goalForDay()
  };
}

function startNextDay() {
  game.dayNumber++;
  game.dayTime = 0;
  game.spawnTimer = CONFIG.spawnInterval; // ilk hasta hemen, sonrakiler aralıkla
  game.queue = [];
  game.counter = [];
  game.feedback = null;
  game.dayStats = { served: 0, correct: 0, wrong: 0, angry: 0, money: 0 };
  rebuildCounterSlots();
  game.state = STATE.PLAYING;
  spawnPatient();
}

// =====================================================================
//  UPDATE
// =====================================================================
function update(dt) {
  game.clock += dt;
  if (game.state !== STATE.PLAYING) return;

  // gün zamanı
  game.dayTime += dt;
  if (game.dayTime >= CONFIG.dayDuration) {
    game.dayTime = CONFIG.dayDuration;
    endDay();
    return;
  }

  // hasta spawn (gün ilerledikçe aralık kısalır)
  game.spawnTimer += dt;
  const prog = game.dayTime / CONFIG.dayDuration;
  const interval = lerp(CONFIG.spawnInterval, CONFIG.minSpawnInterval, prog);
  if (game.spawnTimer >= interval && game.queue.length < CONFIG.maxQueue) {
    game.spawnTimer = 0;
    spawnPatient();
  }

  // pozisyon + giriş animasyonları
  for (let i = 0; i < game.queue.length; i++) {
    const p = game.queue[i];
    p.posCurrent += (i - p.posCurrent) * Math.min(1, dt * 10);
    if (p.enterT < CONFIG.patientEnterTime) p.enterT += dt;
  }

  // sabır + feedback
  if (game.feedback) {
    game.feedback.t += dt;
    if (game.feedback.t >= CONFIG.feedbackDuration) onFeedbackEnd();
  } else {
    for (let i = 0; i < game.queue.length; i++) {
      const rate = i === 0 ? 1 : CONFIG.queuePatienceMultiplier;
      game.queue[i].patience -= dt * rate;
    }
    const act = activePatient();
    if (act && act.patience <= 0) {
      act.patience = 0;
      game.reputation = clamp(game.reputation - CONFIG.angryRepLoss, CONFIG.minReputation, CONFIG.maxReputation);
      game.dayStats.angry++;
      game.feedback = { ok: false, angry: true, text: "😠 Çok beklettin!", t: 0 };
    }
  }
}

// =====================================================================
//  RENDER YARDIMCILARI
// =====================================================================
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function fillRoundRect(x, y, w, h, r, color) {
  roundRect(x, y, w, h, r);
  ctx.fillStyle = color;
  ctx.fill();
}
function strokeRoundRect(x, y, w, h, r, color, lineW) {
  roundRect(x, y, w, h, r);
  ctx.lineWidth = lineW;
  ctx.strokeStyle = color;
  ctx.stroke();
}
// Büfeci tarzı koyu yarı saydam panel: yumuşak gölge + ince amber kenarlık
function drawPanel(x, y, w, h, r, fill, border) {
  const c = CONFIG.colors;
  ctx.save();
  ctx.shadowColor = c.panelShadow;
  ctx.shadowBlur = 16;
  ctx.shadowOffsetY = 5;
  fillRoundRect(x, y, w, h, r, fill || c.panelBg);
  ctx.restore();
  strokeRoundRect(x, y, w, h, r, border || c.panelBorder, Math.max(1, w * 0.004));
}
function text(str, x, y, size, color, align, weight) {
  ctx.fillStyle = color;
  ctx.textAlign = align || "left";
  ctx.textBaseline = "middle";
  ctx.font = (weight || "600") + " " + size + "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
  ctx.fillText(str, x, y);
}

// =====================================================================
//  RENDER — bölümler
// =====================================================================
function drawBackground() {
  const w = layout.w, h = layout.h;
  Sprite.draw(ctx, "bg_pharmacy", 0, 0, w, h, (ctx, x, y, bw, bh) => {

}

function drawHUD() {

// ---- kuyruk yerleşimi: pozisyon değerini sahne koordinatına çevir ----
//  Aktif müşteri: DEV, ortada, tezgah bandının ardına göğüsten gömülü.
//  Bekleyenler: görünmez (tezgahın altında); öne gelince banttan yükselir.
function slotLayout(i) {
  const S = layout.stage;
  const counterLine = layout._counterLine;
  // reçeteli aktif hastada sol panel açılır => müşteri küçülüp sağa kayar
  const ap = activePatient();
  const presc = !!(ap && ap.request.type === "prescription");
  const cx = presc ? S.x + S.w * 0.745 : S.x + S.w * 0.5;
  const charH = presc ? S.h * 0.40 : S.h * 0.675;
  if (i <= 0) {
    return {
      cx,
      baseY: presc ? counterLine + S.h * 0.13 : counterLine + S.h * 0.345,
      charH,
      alpha: 1,
      active: 1
    };
  }
  // bekleyen: aynı konumda ama tezgahın altında ve görünmez (öne gelince yükselir)
  return {
    cx,
    baseY: counterLine + S.h * 0.55,
    charH,
    alpha: 0,
    active: 0
  };
}
function getPatientLayout(pos) {
  const i0 = Math.floor(pos), f = pos - i0;
  const a = slotLayout(i0), b = slotLayout(i0 + 1);
  return {
    cx: lerp(a.cx, b.cx, f),
    baseY: lerp(a.baseY, b.baseY, f),
    charH: lerp(a.charH, b.charH, f),
    alpha: lerp(a.alpha, b.alpha, f),
    active: lerp(a.active, b.active, f)
  };
}

// şeffaf karakterler için yumuşak, sıcak elips zemin gölgesi
function drawGroundShadow(cx, cy, rx, ry) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1, ry / rx);
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
  g.addColorStop(0, "rgba(70, 45, 25, 0.38)");
  g.addColorStop(0.55, "rgba(70, 45, 25, 0.18)");
  g.addColorStop(1, "rgba(70, 45, 25, 0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, rx, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPatienceBar(cx, cy, w, ratio, alpha) {
  const c = CONFIG.colors;
  const h = Math.max(4, w * 0.10);   // ince ve şık
  ctx.globalAlpha = alpha;
  fillRoundRect(cx - w / 2, cy, w, h, h / 2, "rgba(20,15,28,0.55)");
  const col = ratio > 0.5 ? c.patGood : ratio > 0.25 ? c.patMid : c.patBad;
  if (ratio > 0.02) fillRoundRect(cx - w / 2, cy, w * ratio, h, h / 2, col);
  ctx.globalAlpha = 1;
}

function drawOnePatient(p) {
  const counterLine = layout._counterLine;
  const L = getPatientLayout(p.posCurrent);
  const enter = clamp(p.enterT / CONFIG.patientEnterTime, 0, 1);
  const ease = 1 - Math.pow(1 - enter, 3);
  const alpha = L.alpha * ease;

  const ratio = clamp(p.patience / p.maxPatience, 0, 1);
  // sabır azaldıkça hafif titreme (kızgınlık)
  let dx = 0;
  if (ratio < 0.35) dx = Math.sin(game.clock * 24) * L.charH * 0.018 * (1 - ratio / 0.35);

  const cx = L.cx + dx;
  const charH = L.charH;

  ctx.globalAlpha = alpha;

  // 1) zemin gölgesi (tezgah çizgisinde, karakterin yere/tezgaha bastığı his)
  drawGroundShadow(cx, counterLine - charH * 0.012, charH * 0.34, charH * 0.075);

  // 2) karakter — şeffaf PNG, contain (oran korunur, gerilme/kırpma yok)
  //    Kutu kare; 3:4 karakter yükseklikten sınırlanır => yatayda ortalı oturur.
  const boxX = cx - charH / 2;
  const boxY = L.baseY - charH;
  Sprite.draw(ctx, p.avatarKey, boxX, boxY, charH, charH, () => {
    text(p.avatar, cx, L.baseY - charH * 0.5, charH * 0.82, "#000", "center", "400");
  }, "contain");

  ctx.globalAlpha = 1;

  // 3) sabır barı — tezgah çizgisinin hemen üstünde, ince ve ortalı
  const barW = layout.stage.w * 0.42;
  const barH = Math.max(4, barW * 0.05);
  drawPatienceBar(cx, counterLine - barH - layout.stage.h * 0.012, barW, ratio, alpha);
}

// semptomlu hasta — baş üstü konuşma balonu (reçetelilerde sol panel kullanılır)
function drawSymptomBubble(p) {
  const area = layout._patientArea;
  const counterLine = layout._counterLine;
  const areaH = counterLine - area.y;
  const L = getPatientLayout(p.posCurrent);
  if (L.active < 0.12) return;

  const enter = clamp(p.enterT / CONFIG.patientEnterTime, 0, 1);
  const a = L.active * (1 - Math.pow(1 - enter, 3));
  const headTop = L.baseY - L.charH;
  const cx = L.cx;

  const bubbleW = Math.min(area.w * 0.72, areaH * 1.5);
  const bubbleH = areaH * 0.25;
  let bubbleY = headTop - areaH * 0.03 - bubbleH;
  if (bubbleY < area.y) bubbleY = area.y;
  const bubbleX = cx - bubbleW / 2;
  ctx.globalAlpha = a;
  drawSpeechBubble(bubbleX, bubbleY, bubbleW, bubbleH, cx, bubbleY + bubbleH);
  drawSymptom(p.request.symptom, bubbleX, bubbleY, bubbleW, bubbleH);
  ctx.globalAlpha = 1;
}

// reçeteli hasta — stage SOL ÜST köşesinde, sabit makul boyutlu DÜZ reçete paneli
function drawPrescriptionPanel(p) {
  const S = layout.stage;
  const area = layout._patientArea;
  const L = getPatientLayout(p.posCurrent);
  if (L.active < 0.12) return;
  const enter = clamp(p.enterT / CONFIG.patientEnterTime, 0, 1);
  const a = L.active * (1 - Math.pow(1 - enter, 3));

  const w = S.w * 0.42;
  const h = Math.min(S.h * 0.40, area.h * 0.94);
  const x = S.x + S.w * 0.04;
  const top = area.y + S.h * 0.006;
  drawPrescriptionPaper(p, x + w / 2, top, w, h, a);
}

function drawQueue() {
  const area = layout._patientArea;
  const counterLine = layout._counterLine;
  if (game.queue.length === 0) {
    text("🚪 Müşteri bekleniyor...", area.x + area.w / 2, area.y + area.h * 0.6,
      area.h * 0.06, CONFIG.colors.cream, "center", "600");
    return;
  }
  // Sadece AKTİF müşteriyi çiz; tezgah çizgisinde kırp (göğüsten gömülü).
  // Bekleyenler görünmez (banttan yükselerek öne gelirler).
  ctx.save();
  ctx.beginPath();
  ctx.rect(area.x, area.y - area.h * 0.2, area.w, counterLine - (area.y - area.h * 0.2));
  ctx.clip();
  drawOnePatient(game.queue[0]);
  ctx.restore();

  // reçeteli => sol büyük panel; semptomlu => baş üstü balon (kırpma dışında)
  const p0 = game.queue[0];
  if (p0.request.type === "prescription") {
    drawPrescriptionPanel(p0);
  } else {
    drawSymptomBubble(p0);
  }

  // bekleyen sayısı rozeti (üst köşede minik, karmaşa yaratmadan)
  const waiting = game.queue.length - 1;
  if (waiting > 0) {
    const c = CONFIG.colors;
    const bw = area.w * 0.2, bh = layout.stage.h * 0.035;
    const bx = area.x + area.w - bw - layout.stage.w * 0.04;
    const by = area.y + layout.stage.h * 0.008;
    drawPanel(bx, by, bw, bh, bh * 0.5);
    text("👥 +" + waiting, bx + bw / 2, by + bh / 2, bh * 0.5, c.cream, "center", "700");
  }
}

function drawSpeechBubble(x, y, w, h, tailX, tailBaseY) {
  const c = CONFIG.colors;
  // gövde + kuyruk (koyu yarı saydam)
  ctx.save();
  ctx.shadowColor = c.panelShadow;
  ctx.shadowBlur = 16;
  ctx.shadowOffsetY = 5;
  fillRoundRect(x, y, w, h, h * 0.22, c.panelBg);
  ctx.beginPath();
  ctx.moveTo(tailX - w * 0.06, tailBaseY - 2);
  ctx.lineTo(tailX + w * 0.02, tailBaseY + h * 0.14);
  ctx.lineTo(tailX + w * 0.06, tailBaseY - 2);
  ctx.closePath();
  ctx.fillStyle = c.panelBg;
  ctx.fill();
  ctx.restore();
  // ince amber kenarlık
  strokeRoundRect(x, y, w, h, h * 0.22, c.panelBorder, Math.max(1, w * 0.005));
}

// Bir metni verilen maxW'ye sığacak şekilde küçülterek çiz (taşmayı önler).
const RX_FONT = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
function fitText(str, x, y, maxW, px, color, align, weight) {
  let s = px;
  const wgt = weight || "600";
  ctx.font = wgt + " " + s + "px " + RX_FONT;
  while (s > 6 && ctx.measureText(str).width > maxW) {
    s -= 0.5;
    ctx.font = wgt + " " + s + "px " + RX_FONT;
  }
  ctx.fillStyle = color;
  ctx.textAlign = align || "left";
  ctx.textBaseline = "middle";
  ctx.fillText(str, x, y);
  return s;
}

// Reçete kağıdı: kod ile çizilen DÜZ, temiz krem panel + dinamik içerik.
// Tüm içerik iç padding içinde kalır (taşma yok; gerekirse font küçülür).
// Sabit yükseklikli reçete kağıdı (krem zemin + dinamik içerik).
function drawPrescriptionPaper(p, cx, top, w, h, alpha) {
  const items = p.request.items;
  const x = cx - w / 2, y = top;
  const r = Math.min(w, h) * 0.05;
  ctx.save();
  ctx.globalAlpha = alpha;

  // kağıt zemini — krem + yumuşak gölge + ince kenar
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.28)";
  ctx.shadowBlur = h * 0.05;
  ctx.shadowOffsetY = h * 0.015;
  fillRoundRect(x, y, w, h, r, "#f6efdd");
  ctx.restore();
  strokeRoundRect(x, y, w, h, r, "rgba(120,90,50,0.35)", Math.max(1, w * 0.006));

  // içeriği kağıt iç alanına kırp
  const padX = w * 0.09, padY = h * 0.06;
  const lx = x + padX, rx = x + w - padX;
  const innerW = rx - lx;
  ctx.save();
  roundRect(x + w * 0.03, y + h * 0.03, w * 0.94, h * 0.94, r);
  ctx.clip();

  const ink = "#3a3326", inkSoft = "#8a7c5e";

  // üst: kaşe (✚) + doktor adı + tarih
  const headY = y + padY + h * 0.045;
  fitText(p.request.date, rx, headY, innerW * 0.30, h * 0.05, inkSoft, "right", "600");
  fitText("✚ " + p.request.doctor, lx, headY, innerW * 0.66, h * 0.052, ink, "left", "700");

  // ayraç
  ctx.strokeStyle = "rgba(120,90,50,0.35)";
  ctx.lineWidth = Math.max(1, h * 0.005);
  const sep1 = y + padY + h * 0.11;
  ctx.beginPath(); ctx.moveTo(lx, sep1); ctx.lineTo(rx, sep1); ctx.stroke();

  // orta: ilaç listesi (renk noktası + ad + adet)
  const listTop = sep1 + h * 0.03;
  const listBot = y + h - padY - h * 0.14;
  const lineH = Math.min(h * 0.13, (listBot - listTop) / Math.max(1, items.length));
  const fs = Math.min(lineH * 0.55, h * 0.062);
  const qtyW = innerW * 0.20;
  let ly = listTop + lineH * 0.5;
  for (const it of items) {
    const m = getMedicine(it.id);
    const dotR = fs * 0.36;
    ctx.beginPath();
    ctx.arc(lx + dotR, ly, dotR, 0, Math.PI * 2);
    ctx.fillStyle = m.color; ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.18)"; ctx.lineWidth = 1; ctx.stroke();
    fitText("× " + it.qty, rx, ly, qtyW, fs, ink, "right", "800");
    const nameX = lx + dotR * 2 + fs * 0.5;
    fitText(m.name, nameX, ly, rx - qtyW - fs * 0.5 - nameX, fs, ink, "left", "600");
    ly += lineH;
  }

  // alt: ince ayraç + küçük italik imza
  const sep2 = y + h - padY - h * 0.10;
  ctx.strokeStyle = "rgba(120,90,50,0.28)";
  ctx.lineWidth = Math.max(1, h * 0.004);
  ctx.beginPath(); ctx.moveTo(lx, sep2); ctx.lineTo(rx, sep2); ctx.stroke();

  let sg = h * 0.06;
  ctx.font = "italic 700 " + sg + "px 'Segoe Script','Snell Roundhand','Brush Script MT',cursive";
  while (sg > 7 && ctx.measureText(p.request.sig).width > innerW * 0.55) {
    sg -= 0.5;
    ctx.font = "italic 700 " + sg + "px 'Segoe Script','Snell Roundhand','Brush Script MT',cursive";
  }
  ctx.fillStyle = inkSoft;
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  ctx.fillText(p.request.sig, rx, sep2 + h * 0.055);

  ctx.restore();   // içerik kırpması
  ctx.restore();   // ana
}

function drawSymptom(symptom, x, y, w, h) {
  const c = CONFIG.colors;
  text("💬", x + w / 2, y + h * 0.22, h * 0.16, c.creamSoft, "center", "700");
  text(symptom.emoji, x + w / 2, y + h * 0.55, h * 0.42, "#000", "center", "400");
  text(symptom.label, x + w / 2, y + h * 0.85, h * 0.135, c.cream, "center", "600");
}

// Sekme içeriğini (emoji + metin, bir grup olarak) kutunun yatay/dikey TAM ortasına çiz.
// Emoji'nin advance'ı yanlış ölçüldüğü için sabit bir emoji genişliği varsayıp grubu elle ortalar.
function drawTabLabel(emoji, label, cx, cy, maxW, fs, color, weight) {
  let s = fs, emojiW, gapE, textW, total;
  const measure = () => {
    ctx.font = weight + " " + s + "px " + RX_FONT;
    textW = ctx.measureText(label).width;   // düz metin doğru ölçülür
    emojiW = s * 1.05;                       // emoji ~1em (sabit tahmin)
    gapE = s * 0.28;
    total = emojiW + gapE + textW;
  };
  measure();
  while (s > 7 && total > maxW) { s -= 0.5; measure(); }  // sığmazsa küçült

  const startX = cx - total / 2;             // grubu yatayda ortala
  ctx.fillStyle = color;
  ctx.textBaseline = "middle";               // dikeyde ortala
  ctx.textAlign = "left";
  ctx.fillText(emoji, startX, cy);
  ctx.fillText(label, startX + emojiW + gapE, cy);
}

// kategori sekmeleri (yatay, kaydırılabilir; aktif sekme amber vurgulu)
function drawTabs() {
  const ta = layout.tabsArea;
  if (!ta || !layout.tabs) return;
  const c = CONFIG.colors;
  ctx.save();
  ctx.beginPath();
  ctx.rect(ta.x, ta.y, ta.w, ta.h);
  ctx.clip();
  const gap = ta.h * 0.22;
  const off = layout.tabsOffset || 0;
  for (const t of layout.tabs) {
    const sx = ta.x + off + t.x - (layout.tabScroll || 0);
    const bw = t.w - gap;                              // buton genişliği (boşluk hariç)
    if (sx + bw < ta.x || sx > ta.x + ta.w) continue;  // görünmeyen sekmeyi atla
    const active = t.group.id === game.activeGroup;
    const r = ta.h * 0.28;
    const maxTextW = bw * 0.86;                         // içerik butona sığsın (taşma yok)
    const cx = sx + bw / 2, cy = ta.y + ta.h / 2;
    if (active) {
      ctx.save();
      ctx.shadowColor = c.neonGlow;
      ctx.shadowBlur = 10;
      fillRoundRect(sx, ta.y, bw, ta.h, r, "rgba(58,40,20,0.95)");
      ctx.restore();
      strokeRoundRect(sx, ta.y, bw, ta.h, r, c.neon, Math.max(1.5, ta.h * 0.04));
      drawTabLabel(t.group.emoji, t.group.label, cx, cy, maxTextW, ta.h * 0.36, c.neon, "800");
    } else {
      fillRoundRect(sx, ta.y, bw, ta.h, r, "rgba(26,21,36,0.82)");
      strokeRoundRect(sx, ta.y, bw, ta.h, r, "rgba(245,170,70,0.25)", 1);
      drawTabLabel(t.group.emoji, t.group.label, cx, cy, maxTextW, ta.h * 0.34, c.creamSoft, "700");
    }
  }
  ctx.restore();
  // kaydırılabilir olduğunu belli eden kenar gölgeleri
  if ((layout.tabsTotal || 0) > ta.w) {
    const fadeW = ta.w * 0.06;
    if ((layout.tabScroll || 0) > 1) {
      const gl = ctx.createLinearGradient(ta.x, 0, ta.x + fadeW, 0);
      gl.addColorStop(0, "rgba(20,15,26,0.9)"); gl.addColorStop(1, "rgba(20,15,26,0)");
      ctx.fillStyle = gl; ctx.fillRect(ta.x, ta.y, fadeW, ta.h);
    }
    if ((layout.tabScroll || 0) < layout.tabsTotal - ta.w - 1) {
      const gr = ctx.createLinearGradient(ta.x + ta.w - fadeW, 0, ta.x + ta.w, 0);
      gr.addColorStop(0, "rgba(20,15,26,0)"); gr.addColorStop(1, "rgba(20,15,26,0.9)");
      ctx.fillStyle = gr; ctx.fillRect(ta.x + ta.w - fadeW, ta.y, fadeW, ta.h);
    }
  }
}

function drawShelf() {
  const disabled = !!game.feedback || !activePatient();
  for (const btn of layout.shelfButtons) {
    const m = getMedicine(btn.id);
    ctx.globalAlpha = disabled ? 0.55 : 1;

    // hücre zemini — hafif, yuvarlak köşeli koyu yarı saydam (abartısız, okunurluk için)
    fillRoundRect(btn.x, btn.y, btn.w, btn.h, btn.h * 0.18, "rgba(26,21,36,0.28)");

    // ilaç görseli — hücre içinde, ortalı, etrafında boşlukla (contain)
    const pad = btn.w * 0.10;
    const ix = btn.x + pad, iy = btn.y + pad;
    const iw = btn.w - pad * 2, ih = btn.h - pad * 2;
    Sprite.draw(ctx, m.assetKey, ix, iy, iw, ih, () => {
      // fallback (görselsiz ilaçlar): renkli kutu + emoji + ad
      fillRoundRect(ix, iy, iw, ih, iw * 0.18, m.color);
      text(m.emoji, ix + iw / 2, iy + ih * 0.38, ih * 0.40, "#000", "center", "400");
      text(m.name, ix + iw / 2, iy + ih * 0.82, ih * 0.18, "#3a2f45", "center", "700");
    }, "contain");

    ctx.globalAlpha = 1;
  }
}

// Ahşap tezgah bandı — müşteriyi göğüsten keser, üstüne seçilen ilaçlar dizilir.
function drawCounterBand() {
  const b = layout._band;
  if (!b) return;
  // karakterin alt kenarını hafifçe örtmek için bandı bir tık yukarıdan başlat
  const top = b.y - layout.stage.h * 0.006;
  const bandH = (b.y + b.h) - top;
  // counter.png varsa onu kullan (stage boyunca yatay bant, cover); yoksa kod gradyan
  Sprite.draw(ctx, "counter", b.x, top, b.w, bandH, () => {
    const bot = b.y + b.h;
    const g = ctx.createLinearGradient(0, top, 0, bot);
    g.addColorStop(0, "#9a6a40");
    g.addColorStop(0.10, "#85572f");
    g.addColorStop(0.5, "#6e4527");
    g.addColorStop(1, "#4f311d");
    ctx.fillStyle = g;
    ctx.fillRect(b.x, top, b.w, bot - top);
    ctx.fillStyle = "rgba(245, 200, 140, 0.55)";
    ctx.fillRect(b.x, top, b.w, Math.max(2, b.h * 0.05));
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(b.x, bot - b.h * 0.10, b.w, b.h * 0.10);
  }, "cover");
}

// Tezgah çizgisinin ALTINI temiz koyu zemine boyar — bg_pharmacy'nin kendi
// gömülü ahşap tezgahını gizler ki tek tezgah (counter.png) kalsın, grid
// ahşapsız temiz bir alanda dursun ("çift tezgah" görüntüsünü engeller).
function drawLowerBackdrop() {
  const S = layout.stage;
  const y0 = layout._counterLine;
  const g = ctx.createLinearGradient(0, y0, 0, S.y + S.h);
  g.addColorStop(0, "rgba(34, 26, 42, 0.94)");
  g.addColorStop(1, "rgba(20, 15, 26, 0.985)");
  ctx.fillStyle = g;
  ctx.fillRect(S.x, y0, S.w, S.y + S.h - y0);
}

function drawCounter() {
  const c = CONFIG.colors;
  const area = layout._counterArea;
  if (!area) return;

  // bg'nin gömülü tezgahını gizleyen temiz koyu zemin (tek tezgah için)
  drawLowerBackdrop();
  // tek ahşap bant (counter.png) — müşterinin önünde
  drawCounterBand();

  if (game.counter.length === 0) return;  // tezgah temiz kalsın
  for (const slot of layout.counterSlots) {
    const m = getMedicine(slot.id);
    // ilaç görseli — raftaki gibi şeffaf PNG (contain); PNG yoksa renkli kutu + emoji
    Sprite.draw(ctx, m.assetKey, slot.x, slot.y, slot.w, slot.h, () => {
      ctx.save();
      ctx.shadowColor = c.panelShadow;
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 2;
      fillRoundRect(slot.x, slot.y, slot.w, slot.h, slot.w * 0.24, m.color);
      ctx.restore();
      text(m.emoji, slot.x + slot.w / 2, slot.y + slot.h * 0.5, slot.w * 0.55, "#000", "center", "400");
    }, "contain");
    // kaldır işareti
    text("✕", slot.x + slot.w * 0.84, slot.y + slot.h * 0.14, slot.w * 0.24, "rgba(255,235,210,0.85)", "center", "800");
  }
}

function drawServeButton() {
  const c = CONFIG.colors;
  const b = layout.serveBtn;
  const enabled = game.counter.length > 0 && !game.feedback;

  Sprite.draw(ctx, "btn_serve", b.x, b.y, b.w, b.h, () => {
    const r = b.h * 0.32;
    // koyu zemin
    ctx.save();
    ctx.shadowColor = c.panelShadow;
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 5;
    fillRoundRect(b.x, b.y, b.w, b.h, r, c.btnDark);
    ctx.restore();

    // neon çerçeve + glow (aktifken nabız gibi parlar)
    ctx.save();
    if (enabled) {
      const pulse = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(game.clock * 4));
      ctx.shadowColor = c.neonGlow;
      ctx.shadowBlur = 22 * pulse;
    }
    strokeRoundRect(b.x, b.y, b.w, b.h, r, enabled ? c.neon : c.neonDim, Math.max(2, b.w * 0.006));
    ctx.restore();
  });

  // neon yazı (glow'lu)
  ctx.save();
  if (enabled) { ctx.shadowColor = c.neonGlow; ctx.shadowBlur = 16; }
  text("SERVİS ET", b.x + b.w / 2, b.y + b.h / 2, b.h * 0.34,
    enabled ? c.neon : c.neonDim, "center", "800");
  ctx.restore();
}

function drawFeedback() {
  if (!game.feedback) return;
  const c = CONFIG.colors;
  const f = game.feedback;
  const S = layout.stage;

  const t = clamp(f.t / CONFIG.feedbackDuration, 0, 1);
  const pop = t < 0.25 ? (t / 0.25) : 1;
  const fade = t > 0.75 ? (1 - (t - 0.75) / 0.25) : 1;
  const scale = 0.7 + 0.3 * pop;

  ctx.save();
  ctx.globalAlpha = fade;
  const cx = S.x + S.w / 2;
  const cy = layout._patientArea.y + layout._patientArea.h * 0.58;
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.translate(-cx, -cy);

  const boxW = S.w * 0.74;
  const boxH = S.h * 0.10;
  const col = f.ok ? c.good : c.bad;

  ctx.shadowColor = "rgba(0,0,0,0.18)";
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 6;
  fillRoundRect(cx - boxW / 2, cy - boxH / 2, boxW, boxH, boxH * 0.32, col);
  ctx.shadowColor = "transparent";
  text(f.text, cx, cy, boxH * 0.32, "#ffffff", "center", "800");
  ctx.restore();
}

// ---- Gün sonu özet kartı ----
function drawDayEnd() {
  const w = layout.w, h = layout.h, c = CONFIG.colors;
  const S = layout.stage;
  const s = game.dayStats;
  const res = game.dayResult || { goal: goalForDay(), met: s.money >= goalForDay() };

  // tüm ekranı karart
  ctx.fillStyle = "rgba(10, 8, 16, 0.55)";
  ctx.fillRect(0, 0, w, h);

  const cardW = S.w * 0.82;
  const cardH = S.h * 0.56;
  const cardX = S.x + (S.w - cardW) / 2;
  const cardY = S.y + (S.h - cardH) / 2;

  // koyu kart + amber kenarlık
  drawPanel(cardX, cardY, cardW, cardH, cardW * 0.08, c.panelBgSolid);

  // başlık şeridi (amber)
  ctx.save();
  roundRect(cardX, cardY, cardW, cardH, cardW * 0.08);
  ctx.clip();
  fillRoundRect(cardX, cardY, cardW, cardH * 0.17, cardW * 0.08, c.accent);
  ctx.fillStyle = c.accent;
  ctx.fillRect(cardX, cardY + cardH * 0.085, cardW, cardH * 0.085);
  ctx.restore();
  text("🌙 Gün " + game.dayNumber + " Bitti", cardX + cardW / 2, cardY + cardH * 0.085,
    cardH * 0.06, "#1a1410", "center", "800");

  // satırlar
  const lx = cardX + cardW * 0.12;
  const rx = cardX + cardW * 0.88;
  let ly = cardY + cardH * 0.30;
  const step = cardH * 0.095;
  const fs = cardH * 0.05;
  const row = (icon, label, val) => {
    text(icon + " " + label, lx, ly, fs, c.cream, "left", "600");
    text(val, rx, ly, fs, c.neon, "right", "800");
    ly += step;
  };
  row("👥", "Servis edilen", String(s.served));
  row("✓", "Doğru", String(s.correct));
  row("✗", "Yanlış", String(s.wrong));
  row("😠", "Küsen müşteri", String(s.angry));
  row("💰", "Günlük kazanç", s.money + "₺");

  // hedef durumu
  const goalY = cardY + cardH * 0.745;
  const goalCol = res.met ? c.good : c.bad;
  const goalTxt = res.met
    ? "🎯 Hedef tuttu! (" + res.goal + "₺)"
    : "⚠️ Hedef tutmadı (" + res.goal + "₺)";
  fillRoundRect(cardX + cardW * 0.08, goalY, cardW * 0.84, cardH * 0.09, cardH * 0.045,
    res.met ? "rgba(94,196,138,0.18)" : "rgba(232,115,107,0.18)");
  strokeRoundRect(cardX + cardW * 0.08, goalY, cardW * 0.84, cardH * 0.09, cardH * 0.045, goalCol, 1.5);
  text(goalTxt, cardX + cardW / 2, goalY + cardH * 0.045, cardH * 0.045, goalCol, "center", "800");

  // Sonraki Gün butonu (neon)
  const bW = cardW * 0.7, bH = cardH * 0.12;
  const bX = cardX + (cardW - bW) / 2;
  const bY = cardY + cardH * 0.86 - bH / 2;
  layout.nextDayBtn = { x: bX, y: bY, w: bW, h: bH };
  fillRoundRect(bX, bY, bW, bH, bH * 0.34, c.btnDark);
  ctx.save();
  const pulse = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(game.clock * 4));
  ctx.shadowColor = c.neonGlow;
  ctx.shadowBlur = 20 * pulse;
  strokeRoundRect(bX, bY, bW, bH, bH * 0.34, c.neon, Math.max(2, bW * 0.008));
  ctx.restore();
  ctx.save();
  ctx.shadowColor = c.neonGlow;
  ctx.shadowBlur = 14;
  text("Sonraki Gün →", bX + bW / 2, bY + bH / 2, bH * 0.36, c.neon, "center", "800");
  ctx.restore();
}

function render() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, layout.w, layout.h);
  drawBackground();

  if (game.state === STATE.PLAYING) {
    drawHUD();
    drawQueue();        // DEV müşteri (tezgah çizgisinde kırpılı)
    drawCounter();      // ahşap bant müşterinin önünde + seçilen ilaçlar
    drawTabs();         // kategori sekmeleri
    drawShelf();        // seçili kategorinin ilaçları
    drawServeButton();
    drawFeedback();
  } else if (game.state === STATE.DAYEND) {
    // arka planda son kareyi koru + kart
    drawHUD();
    drawQueue();
    drawCounter();
    drawTabs();
    drawShelf();
    drawServeButton();
    drawDayEnd();
  } else if (game.state === STATE.MENU) {
    drawMenuPlaceholder();
  } else if (game.state === STATE.GAMEOVER) {
    drawGameOverPlaceholder();
  }
}

function drawMenuPlaceholder() {
  text("ECZACI", layout.w / 2, layout.h * 0.4, 48, CONFIG.colors.cream, "center", "800");
  text("(MENU — yakında)", layout.w / 2, layout.h * 0.5, 18, CONFIG.colors.creamSoft, "center", "600");
}
function drawGameOverPlaceholder() {
  text("Oyun Bitti", layout.w / 2, layout.h * 0.4, 40, CONFIG.colors.cream, "center", "800");
  text("(GAMEOVER — yakında)", layout.w / 2, layout.h * 0.5, 18, CONFIG.colors.creamSoft, "center", "600");
}

// =====================================================================
//  DOKUNMA / TIKLAMA GİRİŞİ
// =====================================================================
function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

// sekme şeridine dokunulduğunda o kategoriyi seç
function selectTabAt(px, py) {
  const ta = layout.tabsArea;
  if (!ta || !layout.tabs) return;
  const off = layout.tabsOffset || 0;
  for (const t of layout.tabs) {
    const sx = ta.x + off + t.x - (layout.tabScroll || 0);
    if (px >= sx && px <= sx + t.w && py >= ta.y && py <= ta.y + ta.h) {
      if (game.activeGroup !== t.group.id) {
        game.activeGroup = t.group.id;
        buildShelf();
        ensureActiveTabVisible();
      }
      return;
    }
  }
}

function handleTap(px, py) {
  if (game.state === STATE.DAYEND) {
    if (pointInRect(px, py, layout.nextDayBtn)) startNextDay();
    return;
  }
  if (game.state !== STATE.PLAYING) return;

  // sekmeler feedback sırasında da değiştirilebilir
  if (layout.tabsArea && pointInRect(px, py, layout.tabsArea)) { selectTabAt(px, py); return; }

  if (game.feedback) return;

  if (pointInRect(px, py, layout.serveBtn)) { checkOrder(); return; }

  for (const slot of layout.counterSlots) {
    if (pointInRect(px, py, slot)) { removeFromCounter(slot.idx); return; }
  }
  for (const btn of layout.shelfButtons) {
    if (pointInRect(px, py, btn)) { tapMedicine(btn.id); return; }
  }
}

function getEventPos(e) {
  const rect = canvas.getBoundingClientRect();
  let clientX, clientY;
  if (e.changedTouches && e.changedTouches.length) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return { x: clientX - rect.left, y: clientY - rect.top };
}

// işaretçi: tap + sekme şeridinde yatay kaydırma (drag)
const pointer = { down: false, startX: 0, startY: 0, dragging: false, inTabs: false, scrollStart: 0 };

function onDown(x, y) {
  pointer.down = true;
  pointer.startX = x;
  pointer.startY = y;
  pointer.dragging = false;
  pointer.inTabs = game.state === STATE.PLAYING && layout.tabsArea && pointInRect(x, y, layout.tabsArea);
  pointer.scrollStart = layout.tabScroll || 0;
}
function onMove(x, y) {
  if (!pointer.down || !pointer.inTabs) return;
  const dx = x - pointer.startX;
  if (Math.abs(dx) > 6) pointer.dragging = true;
  if (pointer.dragging) {
    const ta = layout.tabsArea;
    const maxS = Math.max(0, (layout.tabsTotal || 0) - ta.w);
    layout.tabScroll = clamp(pointer.scrollStart - dx, 0, maxS);
  }
}
function onUp(x, y) {
  if (!pointer.down) return;
  pointer.down = false;
  if (!pointer.dragging) handleTap(x, y);  // kaydırma değilse tap
}

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  const p = getEventPos(e);
  onDown(p.x, p.y);
}, { passive: false });
canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const p = getEventPos(e);
  onMove(p.x, p.y);
}, { passive: false });
canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  const p = getEventPos(e);
  onUp(p.x, p.y);
}, { passive: false });

canvas.addEventListener("mousedown", (e) => { const p = getEventPos(e); onDown(p.x, p.y); });
canvas.addEventListener("mousemove", (e) => { if (pointer.down) { const p = getEventPos(e); onMove(p.x, p.y); } });
canvas.addEventListener("mouseup", (e) => { const p = getEventPos(e); onUp(p.x, p.y); });

// =====================================================================
//  ANA DÖNGÜ (60 FPS)
// =====================================================================
let lastTime = performance.now();
function loop(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0.1) dt = 0.1;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// =====================================================================
//  TEST CHEAT'LERİ
// =====================================================================
window.cheats = {
  addMoney(n) { game.money += (n || 0); },
  setReputation(n) { game.reputation = clamp(n, CONFIG.minReputation, CONFIG.maxReputation); },
  skipDay() { if (game.state === STATE.PLAYING) endDay(); },
  setPatience(n) { const p = activePatient(); if (p) p.patience = n; },
  clearQueue() { game.queue = []; game.counter = []; game.feedback = null; rebuildCounterSlots(); },
  newPatient() { spawnPatient(); },
  setGroup(gid) { if (medsInGroup(gid).length) { game.activeGroup = gid; buildShelf(); } },
  assetStatus() {
    const keys = ["bg_pharmacy", "counter", "btn_serve"]
      .concat(MEDICINES.map(m => m.assetKey))
      .concat(PATIENT_AVATARS.map(a => a.assetKey));
    const out = {};
    for (const k of keys) out[k] = Assets.images[k] ? "yüklü" : "boş";
    out._summary = Assets.loaded + " / " + Assets.total + " yüklendi";
    return out;
  },
  state() {
    return JSON.parse(JSON.stringify({
      day: game.dayNumber, money: game.money, reputation: game.reputation,
      dayTime: Math.round(game.dayTime), queue: game.queue.length,
      activeGroup: game.activeGroup,
      counter: game.counter, expected: expectedMedicineIds(),
      dayStats: game.dayStats
    }));
  }
};

// =====================================================================
//  BAŞLAT
// =====================================================================
// --- Asset'leri yükle (asenkron; yüklendikçe fallback yerine PNG çizilir) ---
function loadAssets() {
  Assets.load("bg_pharmacy", "assets/bg_pharmacy.png");
  Assets.load("counter", "assets/counter.png");
  Assets.load("med_agriban", "assets/med_agriban.png");
  Assets.load("med_oksurmez", "assets/med_oksurmez.png");
  Assets.load("med_nezleson", "assets/med_nezleson.png");
  Assets.load("med_cvitamin", "assets/med_cvitamin.png");
  Assets.load("med_miderahat", "assets/med_miderahat.png");
  Assets.load("med_bandajix", "assets/med_bandajix.png");
  Assets.load("med_atesdus", "assets/med_atesdus.png");
  Assets.load("med_alerjin", "assets/med_alerjin.png");
  Assets.load("med_goznur", "assets/med_goznur.png");
  Assets.load("med_uykutas", "assets/med_uykutas.png");
  Assets.load("patient_granny", "assets/patient_granny.png");
  Assets.load("patient_man", "assets/patient_man.png");
  Assets.load("patient_youth", "assets/patient_youth.png");
  Assets.load("patient_woman", "assets/patient_woman.png");
  Assets.load("patient_business", "assets/patient_business.png");
  Assets.load("patient_grandpa", "assets/patient_grandpa.png");
  Assets.load("patient_worker", "assets/patient_worker.png");
  Assets.load("patient_lady", "assets/patient_lady.png");
  Assets.load("prescription_paper", "assets/prescription_paper.png");
}

loadAssets();
resize();
game.spawnTimer = CONFIG.spawnInterval;
spawnPatient();
requestAnimationFrame(loop);
